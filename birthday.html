<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(#13008f, #2100ff);
            padding-top: 120px;
            overflow: hidden;
            color: white;
        }

        /* Floating balloons background */
        .balloon {
            position: absolute;
            bottom: -150px;
            animation: floatUp 6s linear infinite;
            opacity: 0.8;
            font-size: 40px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-900px); }
        }

        .box {
            background: rgba(255, 0, 0, 0.9);
            padding: 30px;
            width: 320px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        h1 {
            color: #f5ff77;
            text-shadow: 0 0 10px #fff200;
        }

        input {
            padding: 10px;
            width: 90%;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: black;
            color: white;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff4f9a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px #ff4f9a;
        }

        #wish {
            margin-top: 20px;
            font-size: 20px;
            color: #ffdfef;
        }

        /* Cake appears with animation */
        #cake {
            font-size: 70px;
            margin-top: 20px;
            display: none;
            animation: pop 0.6s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <!-- Floating balloons -->
    <div class="balloon" style="left: 10%;">🎈</div>
    <div class="balloon" style="left: 30%; animation-delay:2s;">🎈</div>
    <div class="balloon" style="left: 50%; animation-delay:4s;">🎉</div>
    <div class="balloon" style="left: 70%; animation-delay:1s;">🎈</div>
    <div class="balloon" style="left: 85%; animation-delay:3s;">✨</div>

    <div class="box">
        <h1>🎉 Happy Birthday 🎉</h1>
        <p>Enter a name to create a wish:</p>

        <input type="text" id="nameInput" placeholder="Enter name">
        <button onclick="makeWish()">Create Wish</button>

        <div id="wish"></div>
        <div id="cake">🎂🎊🎉</div>
    </div>

<script>
    function makeWish() {
        let name = document.getElementById("nameInput").value;

        if (name.trim() === "") {
            document.getElementById("wish").innerHTML = "Please enter a name 😊";
            document.getElementById("cake").style.display = "none";
        } else {
            document.getElementById("wish").innerHTML = 
                "🎂 Happy Birthday, <b>" + name + "</b>! 🎉<br>Wishing you a wonderful and joyful day!";

            // Show cake decoration
            document.getElementById("cake").style.display = "block";
        }
    }
</script>

</body>
</html>
